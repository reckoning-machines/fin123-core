name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m py_compile src/fin123/cli_core.py

      - name: CLI contract check
        run: python scripts/cli_contract_check.py

      - name: Test
        run: pytest --tb=short -q

  native-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap
        run: bash scripts/bootstrap_venv.sh

      - name: Smoke tests
        run: |
          source .venv/bin/activate
          bash scripts/smoke_test.sh

      - name: Acceptance suite
        run: |
          source .venv/bin/activate
          bash scripts/run_acceptance_suite.sh

  smoke-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pyinstaller

      - name: Smoke build (no upload)
        run: |
          python -m PyInstaller --clean --noconfirm packaging/fin123_core.spec
          ./dist/fin123-core --version
